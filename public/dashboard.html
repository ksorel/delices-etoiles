/* ── Staff order modal ──────────────────────────────── */
.staff-modal-overlay {
  position:fixed;inset:0;background:rgba(43,29,22,.6);z-index:300;
  display:flex;align-items:flex-end;justify-content:center;
}
.staff-modal {
  background:#fff;border-radius:20px 20px 0 0;
  width:100%;max-width:640px;max-height:90vh;
  display:flex;flex-direction:column;overflow:hidden;
}
.staff-modal-head {
  padding:16px 20px;border-bottom:1px solid #E0D4C8;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.staff-modal-body { flex:1;overflow-y:auto;padding:0; }
.staff-modal-foot {
  padding:14px 20px;border-top:1px solid #E0D4C8;background:#F5F0EB;flex-shrink:0;
}
.menu-cat-tabs {
  display:flex;gap:8px;padding:10px 16px;overflow-x:auto;
  border-bottom:1px solid #E0D4C8;background:#fff;scrollbar-width:none;
}
.menu-cat-tabs::-webkit-scrollbar{display:none}
.s-cat-btn {
  flex-shrink:0;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;
  border:1.5px solid #E0D4C8;background:#fff;color:#7A6356;cursor:pointer;white-space:nowrap;
}
.s-cat-btn.active{background:#2B1D16;color:#fff;border-color:#2B1D16}
.staff-item-row {
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;border-bottom:1px solid #F5F0EB;cursor:pointer;transition:background .12s;
}
.staff-item-row:hover{background:#FFF0E8}
.staff-item-name{font-size:13px;font-weight:600;color:#2B1D16}
.staff-item-cat{font-size:11px;color:#7A6356}
.staff-item-price{font-size:13px;font-weight:700;color:#F26522;white-space:nowrap}
.staff-cart-item{
  display:flex;align-items:center;gap:8px;padding:8px 16px;
  border-bottom:1px solid #F5F0EB;font-size:13px;
}
.s-qty-btn{
  width:26px;height:26px;border-radius:50%;background:#F5F0EB;
  border:none;font-size:16px;font-weight:700;cursor:pointer;color:#2B1D16;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.s-qty-btn:hover{background:#E8D5C4}

/* ── Plan de salle dashboard ──────────────────────────── */
.fp-modal-overlay {
  position:fixed;inset:0;background:rgba(43,29,22,.6);z-index:300;
  display:flex;align-items:center;justify-content:center;padding:16px;
}
.fp-modal {
  background:#fff;border-radius:16px;
  width:100%;max-width:720px;max-height:90vh;
  display:flex;flex-direction:column;overflow:hidden;
}
.fp-modal-head {
  padding:14px 20px;border-bottom:1px solid #E0D4C8;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.fp-modal-body {
  overflow:auto;padding:16px;flex:1;
}
.fp-dash-grid {
  display:inline-grid;gap:6px;
}

  border-radius:10px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:3px 5px;
  cursor:pointer;
  transition:transform .15s, box-shadow .15s;
  position:relative;
  color:#fff;
  overflow:hidden;
}
.fp-dash-cell .fp-cell-name {
  font-size:11px; font-weight:800;
  text-align:center; line-height:1.1;
  width:100%; overflow:hidden;
  text-overflow:ellipsis; white-space:nowrap;
}
.fp-dash-cell .fp-cell-status {
  font-size:9px; opacity:.85; margin-top:2px;
  white-space:nowrap;
}
.fp-dash-cell:hover { transform:scale(1.05);box-shadow:0 4px 12px rgba(0,0,0,.2); }
.fp-dash-cell.libre    { background:#D1D5DB;color:#6B7280; }
.fp-dash-cell.pending  { background:#F59E0B; }
.fp-dash-cell.preparing{ background:#3B82F6; }
.fp-dash-cell.ready    { background:#EF4444;animation:fp-pulse 1s ease-in-out infinite; }
.fp-dash-cell.done     { background:#10B981; }
.fp-badge-count {
  position:absolute;top:4px;right:4px;
  background:rgba(255,255,255,.3);
  border-radius:8px;font-size:9px;
  padding:1px 4px;font-weight:800;
}
@keyframes fp-pulse {
  0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}
  50%{box-shadow:0 0 0 8px rgba(239,68,68,0)}
}
.fp-legend-dash {
  display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;font-size:12px;
}
.fp-legend-dash span {
  display:flex;align-items:center;gap:5px;
}
.fp-dot-sm {
  width:12px;height:12px;border-radius:3px;flex-shrink:0;
}
</style>

<style>
/* ── Mobile responsive dashboard ─────────────────────────── */

/* Header */
.dash-actions {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.logout-btn {
  font-size: 18px !important;
  padding: 6px 10px !important;
  border-radius: 8px !important;
}

/* Stats bar scrollable on mobile */
.stats-bar {
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.stats-bar::-webkit-scrollbar { display: none; }

/* Filters scrollable */
.filters {
  overflow-x: auto;
  scrollbar-width: none;
  flex-wrap: nowrap !important;
  padding-bottom: 2px;
  -webkit-overflow-scrolling: touch;
}
.filters::-webkit-scrollbar { display: none; }
.filter-btn { flex-shrink: 0; white-space: nowrap; }

/* Orders grid single column on mobile */
@media (max-width: 600px) {
  .orders-grid {
    grid-template-columns: 1fr !important;
  }
  .dash-header {
    padding: 8px 12px !important;
  }
  .dash-title {
    font-size: 14px !important;
  }
  .dash-title img { height: 44px !important; width: auto !important; max-width: 50px !important; object-fit: contain !important; border-radius: 0 !important; flex-shrink: 0 !important; display: inline-block !important; background: transparent !important; }
  .dash-meta {
    font-size: 11px !important;
  }
  .sound-btn {
    padding: 6px 8px !important;
    font-size: 14px !important;
  }
  .stat-box {
    min-width: 80px !important;
    padding: 10px 8px !important;
  }
  .stat-num {
    font-size: 22px !important;
  }
  .stat-lbl {
    font-size: 10px !important;
  }
  /* Order cards */
  .order-card {
    font-size: 13px !important;
  }
  .order-id {
    font-size: 13px !important;
  }
  .status-btn {
    padding: 8px 10px !important;
    font-size: 12px !important;
  }
}

/* Plan de salle modal mobile */
@media (max-width: 600px) {
  .fp-modal {
    border-radius: 20px 20px 0 0;
    max-height: 80vh;
  }
  .fp-modal-overlay {
    align-items: flex-end;
    padding: 0;
  }
  .fp-dash-grid {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    max-width: 100%;
  }
  .fp-dash-cell {
    width: 60px !important;
    height: 56px !important;
  }
}
</style>

.status-btns { display: var(--status-btns-display) !important; }

let ORDER_EXPIRY_MS = 2 * 3600 * 1000;   // délai avant expiration (défaut 2h, surchargé par config)

// Date de création d'une commande en ms.
function orderCreatedMs(o) {
  try { return o.createdAt?.toDate ? o.createdAt.toDate().getTime() : (o.createdAt?.seconds ? o.createdAt.seconds * 1000 : 0); }
  catch (_) { return 0; }
}
// Une commande est « expirée » si elle est restée EN ATTENTE au-delà du délai
// (jamais traitée/confirmée). Les commandes prises en charge ne expirent pas.
function isExpired(o) {
  if (o.status !== 'pending') return false;
  const ms = orderCreatedMs(o);
  return ms > 0 && (Date.now() - ms) > ORDER_EXPIRY_MS;
}

// ── Auth ──────────────────────────────────────────────────
window.doLogin = async function() {
  const raw  = document.getElementById('email-input').value.trim().toLowerCase();
  const pass = document.getElementById('pass-input').value;
  const err  = document.getElementById('login-err');
  err.textContent = '';
  if (!raw) { err.textContent = 'Saisissez votre identifiant.'; return; }
  // Identifiant simple → email interne fictif ; un email complet reste accepté tel quel.
  const email = raw.includes('@') ? raw : raw + '@delices-etoiles.staff';
  try {
    try { await enableNetwork(db); } catch (_) {}   // au cas où une déconnexion précédente l'a coupé
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (e) {
    err.textContent = 'Identifiant ou mot de passe incorrect.';
  }
};

window.doLogout = async function() {
  try {
    await disableNetwork(db);
    if (unsubOrders) { try { unsubOrders(); } catch(e) {} unsubOrders = null; }
    if (unsubReservations) { try { unsubReservations(); } catch(e) {} unsubReservations = null; }
  } catch(e) {}
  // Réinitialiser l'état local pour qu'un autre utilisateur ne voie rien de la
  // session précédente (établissement, commandes/réservations en mémoire, rôle).
  allOrders = []; allReservations = []; dashMenu = []; staffCart = [];
  currentRole = ''; currentRoles = []; currentRestoId = null; currentUser = null;
  activeFilter = 'all';
  // Vider le cache PWA (assets JS/HTML) pour repartir sur une version fraîche
  try {
    const keys = await caches.keys();
    await Promise.all(keys.map(k => caches.delete(k)));
  } catch(_) {}
  await signOut(auth);
};

onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;
    try { await enableNetwork(db); } catch (_) {}

    // Lire le rôle — avec retry si custom claim pas encore propagé
    let token = await user.getIdTokenResult();
    currentRole = token.claims.role || '';

    // Si pas de rôle : forcer refresh du token (cas nouvel utilisateur)
    if (!currentRole) {
      token = await user.getIdToken(true).then(() => user.getIdTokenResult());
      currentRole = token.claims.role || '';
    }

    // Si toujours pas de rôle après refresh : attendre 2s et réessayer
    if (!currentRole) {
      await new Promise(r => setTimeout(r, 2000));
      token = await user.getIdToken(true).then(() => user.getIdTokenResult());
      currentRole = token.claims.role || 'serveur'; // défaut serveur si toujours vide
    }

    // Établissement de rattachement (les rôles ≠ admin sont liés à un lieu)
    currentRestoId = token.claims.restoId || null;

    // Rôles multiples (fallback sur le rôle unique pour les comptes anciens)
    currentRoles = (Array.isArray(token.claims.roles) && token.claims.roles.length)
      ? token.claims.roles : [currentRole];

    // Rafraîchir le token toutes les 55min pour éviter l'expiration silencieuse
    if (window._tokenRefreshInterval) clearInterval(window._tokenRefreshInterval);
    window._tokenRefreshInterval = setInterval(async () => {
      try { await user.getIdToken(true); } catch(e) { console.warn('Token refresh:', e); }
    }, 55 * 60 * 1000);

    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dash-app').style.display     = 'block';

    // Init assistant IA (après login seulement)

      // Le Traiteur est central (transverse aux établissements) : réservé au propriétaire et au gérant.

        const alerts = snap.docs
          .map(d => ({ id: d.id, ...d.data() }))
          .filter(a => !a.read); // filtrer non-lus côté client
        const bar = document.getElementById('traiteur-alert-bar');
        if (!bar) return;
        if (!alerts.length) { bar.style.display = 'none'; return; }
        bar.style.display = 'block';
        bar.innerHTML = alerts.map(a =>
          '<div style="display:flex;align-items:center;justify-content:space-between;'
          + 'padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.15)">'
          + '<div style="display:flex;align-items:center;gap:10px">'
          + '<span style="font-size:20px">' + (a.daysLeft === 1 ? '🚨' : '⚠️') + '</span>'
          + '<div>'
          + '<div style="font-size:13px;font-weight:700">'
          + a.typeEv + ' — ' + a.clientNom
          + ' <span style="font-weight:400;opacity:.8">(' + a.nbPersonnes + ' pers.)</span></div>'

    // Afficher le bouton "Commande" uniquement pour admin, serveur, bar
    // ── Matrice des permissions par rôle ──────────────────
    const ROLES_CONFIG = {

      caissier: { canOrder: false, canPay: true,  canStatus: false, canPlan: true,  filterAuto: null,         masquePlan: false, tabs: ['all','salle','livraison','done','expired'], stats: ['pending','done','ca'] },
    };
    // Fusion des rôles : union des onglets/stats/permissions
    function mergeRoleConfigs(roles) {
      const cfgs = (roles || []).map(r => ROLES_CONFIG[r]).filter(Boolean);
      if (!cfgs.length) cfgs.push(ROLES_CONFIG.serveur);
      const merged = {

        stats: cfgs.some(c => c.stats === null) ? null : [...new Set(cfgs.flatMap(c => c.stats))],

      cuisine:  { label: 'CUISINE',        color: '#10B981', bg: 'rgba(16,185,129,.2)', icon: '👨‍🍳' },
      livreur:  { label: 'LIVREUR',        color: '#F59E0B', bg: 'rgba(245,158,11,.2)', icon: '🚴' },
      caissier: { label: 'CAISSIER',       color: '#EC4899', bg: 'rgba(236,72,153,.2)', icon: '💳' },
    };
    // Supprimer l'ancien badge si existant
    document.getElementById('role-badge')?.remove();
    const roleBadge = document.createElement('div');
    roleBadge.id = 'role-badge';
    roleBadge.style.cssText = 'display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex-shrink:0';

// ── Dashboard ─────────────────────────────────────────────
async function initDashboard() {
  // Date/heure
  const updateTime = () => {
    document.getElementById('dash-date').textContent =
      new Date().toLocaleDateString('fr-FR', {
        weekday:'long', day:'numeric', month:'long',
        hour:'2-digit', minute:'2-digit'
      });
  };
  updateTime();
  setInterval(updateTime, 30000);

  // Charger le menu pour les commandes serveur (limité à l'établissement)
  try {
    const mCons = [ where('available','==',true) ];
    if (currentRestoId) mCons.push(where('restoId','==',currentRestoId));
    const mSnap = await getDocs(query(collection(db,'menus'), ...mCons));
    dashMenu = mSnap.docs.map(d=>({id:d.id,...d.data()}));
  } catch(e) { console.warn('Menu load:', e); }

  // Écouter les changements du plan de salle de l'établissement en temps réel
  const _layoutId = currentRestoId ? 'layout-' + currentRestoId : 'layout';
  onSnapshot(doc(db,'floor-plan',_layoutId), snap => {
    if (snap.exists()) {
      window._floorPlanTables = snap.data().tables || [];
    }
  });

  // Écoute Firestore — commandes non archivées de l'établissement
  const oCons = [ where('status', 'in', ['pending', 'preparing', 'ready', 'done']) ];
  if (currentRestoId) oCons.push(where('restoId', '==', currentRestoId));
  oCons.push(orderBy('createdAt', 'desc'));
  const q = query(collection(db, 'commandes'), ...oCons);

  unsubOrders = onSnapshot(q, snap => {
    const newOrders = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    // Notification sonore sur nouvelle commande pending
    const newPending = newOrders.filter(o => o.status === 'pending');
    const oldPending = allOrders.filter(o => o.status === 'pending');
    if (soundEnabled && currentRole !== 'manager' && newPending.length > oldPending.length) {
      audio.play().catch(() => {});
    }

    allOrders = newOrders;
    updateStats();
    renderOrders();
  },
  err => { if (err.code !== 'permission-denied') console.error(err); }
  );

  // Écoute Firestore — réservations de table de l'établissement
  if (unsubReservations) { try { unsubReservations(); } catch(e) {} }
  const rCons = [orderBy('createdAt', 'desc')];
  if (currentRestoId) rCons.unshift(where('restoId', '==', currentRestoId));
  const rq = query(collection(db, 'reservations'), ...rCons);
  unsubReservations = onSnapshot(rq, snap => {
    const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const nP = list.filter(r => r.status === 'pending').length;
    const oP = allReservations.filter(r => r.status === 'pending').length;
    if (soundEnabled && currentRole !== 'manager' && nP > oP) audio.play().catch(() => {});
    allReservations = list;
    updateReservationBadge();
    if (activeFilter === 'reservations') renderOrders();
  }, err => { if (err.code !== 'permission-denied') console.error(err); });
  // Rafraîchir périodiquement pour que les commandes franchissant le délai
  // basculent en « expirées » même sans nouvelle donnée.
  if (!window._expiryTimer) {
    window._expiryTimer = setInterval(() => {
      if (allOrders.length) { updateStats(); renderOrders(); }
    }, 5 * 60 * 1000);
  }
}

// ── Stats ─────────────────────────────────────────────────
// Affiche le nom de l'établissement de l'employé sous le titre du header.
async function showEstablishmentName() {
  if (!currentRestoId) return;   // propriétaire : aucun lieu unique
  try {
    const snap = await getDocs(query(collection(db, 'restos')));
    const rdoc = snap.docs.find(d => d.id === currentRestoId);
    const nom  = rdoc ? (rdoc.data().nom || rdoc.data().commune || currentRestoId) : currentRestoId;
    const titleEl = document.querySelector('.dash-title');
    if (titleEl && !document.getElementById('dash-resto')) {
      const chip = document.createElement('div');
      chip.id = 'dash-resto';
      chip.style.cssText = 'font-size:12px;font-weight:800;color:#F26522;margin-top:2px';
      chip.textContent = '📍 ' + nom;
      titleEl.after(chip);
    }
    // Contact du responsable, propre à l'établissement de l'employé (config/{restoId}).
    try {
      const cfg = await getDoc(doc(db, 'config', currentRestoId));
      const c   = cfg.exists() ? (cfg.data().contacts || {}) : {};
      const hrs = cfg.exists() ? Number(cfg.data().orderExpiryHours) : NaN;
      if (!isNaN(hrs)) { ORDER_EXPIRY_MS = hrs > 0 ? hrs * 3600 * 1000 : Infinity; updateStats(); renderOrders(); }
      const tel = c.tel1 || c.tel2;
      if (tel && titleEl && !document.getElementById('dash-contact')) {
        const link = document.createElement('a');
        link.id = 'dash-contact';
        link.href = 'tel:' + tel.replace(/\s/g, '');
        link.style.cssText = 'display:inline-flex;align-items:center;gap:5px;margin-top:4px;'
          + 'background:rgba(255,255,255,.12);color:#fff;padding:3px 10px;border-radius:14px;'
          + 'font-size:11px;font-weight:700;text-decoration:none;width:fit-content';
        link.innerHTML = '📞 ' + (c.tel1_label || 'Responsable') + ' · ' + tel;
        (document.getElementById('dash-resto') || titleEl).after(link);
      }
    } catch (_) {}
  } catch (e) { console.warn('Resto name:', e); }
}

function updateStats() {
  const counts = { pending:0, preparing:0, ready:0, done:0 };
  let ca = 0;
  for (const o of allOrders) {
    if (isExpired(o)) continue;   // les expirées ne comptent pas dans les stats actives
    counts[o.status] = (counts[o.status] || 0) + 1;
    if (o.status === 'done') ca += o.total || 0;
  }
  document.getElementById('s-pending').textContent = counts.pending;
  document.getElementById('s-prep').textContent    = counts.preparing;
  document.getElementById('s-ready').textContent   = counts.ready;
  document.getElementById('s-done').textContent    = counts.done;
  document.getElementById('s-ca').textContent      = new Intl.NumberFormat('fr-FR').format(ca);
}

// ── Filtres ───────────────────────────────────────────────
window.setFilter = function(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
};

// ── Rendu commandes ───────────────────────────────────────
function renderOrders() {
  const grid = document.getElementById('orders-grid');

  // Vue Réservations (données distinctes des commandes)
  if (activeFilter === 'reservations') { renderReservations(grid); return; }

  let filtered = allOrders;

  if (activeFilter === 'expired') {
    filtered = filtered.filter(isExpired);
  } else {
    // Les commandes expirées sortent de toutes les vues actives.
    filtered = filtered.filter(o => !isExpired(o));
    if (activeFilter === 'salle')     filtered = filtered.filter(o => o.type === 'salle');
    else if (activeFilter === 'livraison') filtered = filtered.filter(o => o.type === 'livraison');
    else if (['pending','preparing','ready','done'].includes(activeFilter))
      filtered = filtered.filter(o => o.status === activeFilter);
  }

  if (!filtered.length) {
    grid.innerHTML = `
      <div class="empty-state">

  if (!el) { el = document.createElement('div'); el.id = 'toast'; document.body.appendChild(el); }
  el.textContent = msg; el.classList.add('show');
  clearTimeout(window._toastT); window._toastT = setTimeout(() => el.classList.remove('show'), 2500);
}
function updateReservationBadge() {
  const n = allReservations.filter(r => r.status === 'pending').length;
  const el = document.getElementById('resa-count');

}
function renderReservations(grid) {

function renderReservationCard(r) {
  const stMap = {
    pending:  { label:'⏳ En attente', color:'#D97706', bg:'#FEF3C7' },
    confirmed:{ label:'✅ Confirmée',  color:'#059669', bg:'#ECFDF5' },
    refused:  { label:'✕ Refusée',    color:'#991B1B', bg:'#FEE2E2' },
  };
  const st = stMap[r.status] || stMap.pending;
  const when = (r.date || '') + (r.heure ? ' à ' + r.heure : '');
  const actions = r.status === 'pending'
    ? '<div style="display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--bg)">'
      + '<button onclick="confirmReservation(\'' + r.id + '\')" style="flex:1;padding:9px;border:none;border-radius:8px;background:#ECFDF5;color:#059669;font-weight:700;font-size:13px;cursor:pointer">✅ Confirmer</button>'
      + '<button onclick="refuseReservation(\'' + r.id + '\')" style="flex:1;padding:9px;border:none;border-radius:8px;background:#FEE2E2;color:#991B1B;font-weight:700;font-size:13px;cursor:pointer">✕ Refuser</button>'
      + '</div>' : '';
  const itemsHtml = (r.items && r.items.length)
    ? '<div style="margin-top:8px;padding-top:8px;border-top:1px dashed var(--bg)">'
      + '<div style="font-size:11px;font-weight:700;color:#7A6356;text-transform:uppercase;margin-bottom:4px">🍽️ Plats souhaités (indicatif)</div>'
      + r.items.map(function(i) {
          return '<div style="display:flex;justify-content:space-between;font-size:12px;color:#2B1D16;padding:2px 0">'
            + '<span>' + i.name + ' ×' + i.qty + '</span>'
            + '<span style="color:var(--muted)">' + new Intl.NumberFormat('fr-FR').format(i.subtotal || 0) + ' F</span></div>';
        }).join('')
      + '</div>'
    : '';
  return '<div class="order-card">'
    + '<div class="order-card-head">'
    +   '<div><div class="order-id">📅 ' + (r.nom || '—') + '</div>'
    +   '<div class="order-time">' + when + (r.personnes ? ' · ' + r.personnes + ' pers.' : '') + '</div></div>'
    +   '<span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;background:' + st.bg + ';color:' + st.color + '">' + st.label + '</span>'
    + '</div>'
    + '<div style="padding:10px 14px;font-size:13px;color:#2B1D16">'
    +   '📞 <a href="tel:' + String(r.telephone || '').replace(/\s/g, '') + '" style="color:#F26522;font-weight:700;text-decoration:none">' + (r.telephone || '—') + '</a>'
    +   (r.note ? '<div style="margin-top:6px;font-size:12px;color:#7A6356">💬 ' + r.note + '</div>' : '')

function buildCard(o) {
  const timeObj = o.createdAt?.toDate ? o.createdAt.toDate() : null;
  const time = timeObj
    ? timeObj.toLocaleString('fr-FR', { 
        day:'2-digit', month:'2-digit', 
        hour:'2-digit', minute:'2-digit' 
      }).replace(',', ' à')
    : '—';
  const _code = (o.restoId || '').slice(0, 3).toUpperCase();
  const num = (_code ? _code + '-' : '') + o.id.slice(-6).toUpperCase();
  // Chercher le nom de table à jour depuis le plan de salle
  const fpTable = (window._floorPlanTables || []).find(t => String(t.id) === String(o.tableId));
  const tableDisplayName = fpTable ? fpTable.label : (o.tableId || '');
  const sessionBadge = o.sessionId
    ? `<span style="font-size:10px;background:#E6F1FB;color:#185FA5;padding:2px 7px;border-radius:10px;font-weight:700;margin-left:6px">Session #${o.sessionId}</span>`
    : '';
  const staffBadge = o.saisieParServeur
    ? `<span style="font-size:10px;background:#D1FAE5;color:#065F46;padding:2px 7px;border-radius:10px;font-weight:700;margin-left:4px">👨‍🍳 Serveur</span>`
    : '';

  const itemsHtml = (o.items || []).map(item => {
    const opts = [
      item.glace != null ? (item.glace ? '🧊' : 'Sans glaçons') : '',
      item.format ? (item.format === 'grand' ? 'Grand format' : '') : '',
      item.variant || '',
    ].filter(Boolean).join(' · ');

    return `
      <div class="order-item">
        <div>
          <span class="item-qty">×${item.qty}</span>
          <span class="item-name">${item.name}</span>
          ${opts ? `<div class="item-opts">${opts}</div>` : ''}
          ${item.comment ? `<div class="item-comment">💬 ${item.comment}</div>` : ''}
        </div>
        <span style="font-weight:700;font-size:12px;color:#7A6356;white-space:nowrap">
          ${new Intl.NumberFormat('fr-FR').format(item.subtotal||0)}
        </span>
      </div>`;
  }).join('');

  const deliveryHtml = o.type === 'livraison' && o.livraison ? `
    <div class="delivery-info">
      📍 ${o.livraison.adresse} — ${o.livraison.zoneName}<br>
      📞 ${o.livraison.nom ? o.livraison.nom + ' · ' : ''}${o.livraison.telephone}<br>
      💳 ${o.livraison.operateur?.toUpperCase() || 'Mobile Money'}
    </div>` : o.type === 'surplace' && o.telephone ? `
    <div class="delivery-info">
      📞 ${o.telephone}
    </div>` : '';

  // Boutons selon statut + mode paiement
  let actionBtns = '';
  if (o.status === 'pending') {
    actionBtns = `<button class="status-btn btn-start" onclick="updateStatus('${o.id}','preparing')">🔥 Commencer</button>`;
  } else if (o.status === 'preparing') {
    actionBtns = `<button class="status-btn btn-ready" onclick="updateStatus('${o.id}','ready')">✅ Prêt</button>`;
  } else if (o.status === 'ready') {
    if (o.type === 'salle' || o.type === 'surplace') {
      // Salle / sur place : pas de livreur, paiement à l'arrivée du client
      const payStatus = o.paymentStatus || 'pending_cash';
      const operateur = o.operateur || 'especes';
      if (payStatus === 'pending_cash') {
        actionBtns = `
          <div style="display:flex;flex-direction:column;gap:6px;width:100%">
            <div style="font-size:11px;font-weight:700;color:#7A6356;margin-bottom:2px">💵 Paiement espèces</div>
            <div style="display:flex;gap:6px">
              <button class="status-btn" style="background:#D1FAE5;color:#065F46;flex:1"
                onclick="confirmPayment('${o.id}','especes')">💵 Espèces reçues</button>
              <button class="status-btn btn-done" style="flex:1"
                onclick="updateStatus('${o.id}','done')">✓ Servi</button>
            </div>
          </div>`;
      } else if (payStatus === 'awaiting_payment') {
        actionBtns = `
          <div style="display:flex;flex-direction:column;gap:6px;width:100%">
            <div style="font-size:11px;font-weight:700;color:#854F0B;margin-bottom:2px">📱 ${operateur.toUpperCase()} — En attente paiement</div>
            <div style="display:flex;gap:6px">
              <button class="status-btn" style="background:#DBEAFE;color:#1D4ED8;flex:1"
                onclick="confirmPayment('${o.id}','${operateur}')">✓ Paiement confirmé</button>
              <button class="status-btn btn-done" style="flex:1"
                onclick="updateStatus('${o.id}','done')">✓ Servi</button>
            </div>
          </div>`;
      } else if (payStatus === 'paid') {
        actionBtns = `
          <div style="display:flex;gap:6px">
            <div style="font-size:11px;color:#0F6E56;font-weight:700;flex:1">✅ Payé (${operateur})</div>
            <button class="status-btn btn-done" style="flex:1"
              onclick="updateStatus('${o.id}','done')">✓ Servi</button>
          </div>`;
      }
    } else {
      // Livraison : ready → en route
      const livOperateur = o.operateur || 'especes';
      const livPayStatus = o.paymentStatus || 'pending_cash';
      if (livPayStatus === 'pending_cash') {
        actionBtns = `
          <div style="display:flex;flex-direction:column;gap:6px;width:100%">
            <div style="font-size:11px;font-weight:700;color:#7A6356">💵 Paiement espèces à la livraison</div>
            <button class="status-btn" style="background:#3B82F6;color:#fff;width:100%"
              onclick="updateStatus('${o.id}','delivering')">🚴 Parti en livraison</button>
          </div>`;
      } else {
        actionBtns = `
          <div style="display:flex;flex-direction:column;gap:6px;width:100%">
            <div style="font-size:11px;font-weight:700;color:#854F0B">📱 ${livOperateur.toUpperCase()} — Vérifier paiement</div>
            <button class="status-btn" style="background:#3B82F6;color:#fff;width:100%"
              onclick="updateStatus('${o.id}','delivering')">🚴 Parti en livraison</button>
          </div>`;
      }
    }
  } else if (o.status === 'delivering') {
    // En route → confirmation livraison + encaissement
    const livOp = o.operateur || 'especes';
    const livTotal = o.total || 0;
    if (livOp === 'especes') {
      actionBtns = `
        <div style="display:flex;flex-direction:column;gap:8px;width:100%">
          <div style="background:#FFF8F0;border-radius:8px;padding:10px;text-align:center">
            <div style="font-size:12px;color:#7A6356;margin-bottom:4px">💵 Espèces à encaisser</div>
            <div style="font-size:22px;font-weight:800;color:#F26522">${livTotal.toLocaleString('fr-FR')} FCFA</div>
          </div>
          <button class="status-btn" style="background:#10B981;color:#fff;font-weight:800"
            onclick="confirmDelivery('${o.id}','especes',${livTotal})">
            ✅ Livré + Espèces reçues
          </button>
        </div>`;
    } else {
      actionBtns = `
        <div style="display:flex;flex-direction:column;gap:8px;width:100%">
          <div style="background:#FFF8F0;border-radius:8px;padding:8px;text-align:center">
            <div style="font-size:12px;color:#7A6356">📱 Paiement ${livOp.toUpperCase()} attendu</div>
          </div>
          <button class="status-btn" style="background:#10B981;color:#fff;font-weight:800"
            onclick="confirmDelivery('${o.id}','${livOp}',${livTotal})">
            ✅ Livré + Paiement confirmé
          </button>
        </div>`;
    }
  } else if (o.status === 'done') {
    const payIcon = o.paymentStatus === 'paid' ? '✅' : '⏳';
    const payLabel = o.paymentStatus === 'paid'
      ? 'Payé (' + (o.operateur || 'espèces') + ')'
      : 'Paiement en attente';
    actionBtns = `
      <div style="display:flex;align-items:center;justify-content:space-between;width:100%">
        <span style="font-size:12px;color:#6B7280">${payIcon} Terminée · ${payLabel}</span>
        ${o.sessionId ? `<button class="btn btn-sm" style="background:#E6F1FB;color:#185FA5;font-size:11px;padding:4px 10px"
          onclick="showSessionInvoice('${o.sessionId}','${o.tableId||''}')">🧾 Facture</button>` : ''}
      </div>`;
  }

  return `
    <div class="order-card status-${o.status}" id="card-${o.id}">
      <div class="order-head">
        <div>
          <div class="order-id">#${num} ${sessionBadge}${staffBadge}${isExpired(o) ? ' <span style="background:#F3E8E2;color:#8A6D5B;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px">⏰ expirée</span>' : ''}</div>
          <div class="order-time">${time}</div>
        </div>
        <span class="order-type ${o.type}">${o.type === 'salle' ? `🪑 Table ${o.tableId || ''}` : o.type === 'surplace' ? `🍽️ Sur place${o.surplace ? ' · ' + (o.surplace.date || '') + ' ' + (o.surplace.heure || '') : ''}` : '🚴 Livraison'}</span>
      </div>
      <div class="order-items">${itemsHtml}</div>
      <div class="order-footer">
        ${deliveryHtml}
        <div class="order-total">Total : ${new Intl.NumberFormat('fr-FR').format(o.total||0)} FCFA</div>
        <div class="status-btns">${actionBtns}</div>
      </div>
    </div>`;
}

window.showFloorPlan = async function() {
  document.getElementById('floor-plan-modal')?.remove();

  // Charger le plan
  let tables = [];
  try {
    const snap = await getDocs(query(collection(db,'floor-plan')));
    const _lid = currentRestoId ? 'layout-' + currentRestoId : 'layout';
    const layout = snap.docs.find(d => d.id === _lid) || (currentRestoId === 'bassam' ? snap.docs.find(d => d.id === 'layout') : null);
    if (layout) tables = layout.data().tables || [];
  } catch(e) {}

  if (!tables.length) {
    alert('Aucun plan de salle configuré. Allez dans Admin → Plan de salle pour le créer.');
    return;
  }

  await renderFloorPlanModal(tables);
};

async function renderFloorPlanModal(tables) {
  // Recharger le plan pour avoir les noms à jour
  try {
    const snap = await getDocs(query(collection(db,'floor-plan')));
    const _lid = currentRestoId ? 'layout-' + currentRestoId : 'layout';
    const layout = snap.docs.find(d => d.id === _lid) || (currentRestoId === 'bassam' ? snap.docs.find(d => d.id === 'layout') : null);
    if (layout && layout.data().tables?.length) tables = layout.data().tables;
  } catch(e) {}

  const maxCol = Math.max(...tables.map(t=>t.col)) + 1;
  const maxRow = Math.max(...tables.map(t=>t.row)) + 1;

  // Agréger les statuts par tableId depuis allOrders
  const tableStatus = {};
  for (const o of allOrders) {
    if (!o.tableId || o.type !== 'salle') continue;
    const tid = String(o.tableId);
    const cur = tableStatus[tid];
    // Priorité: ready > preparing > pending > done
    const priority = { ready:4, preparing:3, pending:2, done:1 };
    if (!cur || (priority[o.status]||0) > (priority[cur.status]||0)) {
      tableStatus[tid] = { status: o.status, count: (cur?.count||0)+1 };
    } else {
      tableStatus[tid] = { ...cur, count: (cur?.count||0)+1 };
    }
  }

  // Construire la grille
  const rows = Array.from({length:maxRow}, (_, r) =>
    Array.from({length:maxCol}, (_, c) => {
      const table = tables.find(t => t.col===c && t.row===r);
      if (!table) return `<div style="width:72px;height:64px"></div>`;
      const tid = String(table.id);
      const ts  = tableStatus[tid];
      const cls = ts ? ts.status : 'libre';
      const badge = ts ? `<div class="fp-badge-count">${ts.count}</div>` : '';
      const statusText = cls === 'libre' ? 'Libre' : cls === 'pending' ? 'En attente' : cls === 'preparing' ? 'En prépa' : cls === 'ready' ? '⚡ Prête !' : 'Servie';
      // Utiliser le label à jour depuis le listener temps réel
      const liveTable = (window._floorPlanTables || tables).find(t => String(t.id) === String(tid)) || table;
      const liveLabel = liveTable.label || table.label;
      const shortLabel = liveLabel.length > 8 ? liveLabel.slice(0,7)+'…' : liveLabel;
      return `<div class="fp-dash-cell ${cls}"
        onclick="window.filterByTable('${tid}','${liveLabel.replace(/'/g, '')}')"
        title="${liveLabel}">
        ${badge}
        <div class="fp-cell-name">${shortLabel}</div>
        <div class="fp-cell-status">${statusText}</div>
      </div>`;
    }).join('')
  ).map(r => `<div style="display:flex;gap:6px">${r}</div>`).join('');

  const urgentCount = Object.values(tableStatus).filter(s=>s.status==='ready').length;

  const overlay = document.createElement('div');
  overlay.id = 'floor-plan-modal';
  overlay.className = 'fp-modal-overlay';
  overlay.innerHTML = `
    <div class="fp-modal">
      <div class="fp-modal-head">
        <div>
          <div style="font-size:16px;font-weight:800;color:#2B1D16">🗺️ Plan de salle — Vue en direct</div>
          ${urgentCount > 0 ? `<div style="font-size:12px;color:#EF4444;font-weight:700">⚡ ${urgentCount} table(s) à servir maintenant !</div>` : '<div style="font-size:12px;color:#6B7280">Cliquez sur une table pour voir ses commandes</div>'}
        </div>
        <button onclick="document.getElementById('floor-plan-modal').remove()"
          style="background:#F5F0EB;border:none;border-radius:50%;width:32px;height:32px;font-size:18px;cursor:pointer">×</button>
      </div>
      <div class="fp-modal-body">
        <div class="fp-dash-grid" style="grid-template-columns:repeat(${maxCol},72px)">
          ${rows}
        </div>
        <div class="fp-legend-dash">
          <span><div class="fp-dot-sm" style="background:#D1D5DB"></div>Libre</span>
          <span><div class="fp-dot-sm" style="background:#F59E0B"></div>En attente</span>
          <span><div class="fp-dot-sm" style="background:#3B82F6"></div>En préparation</span>
          <span><div class="fp-dot-sm" style="background:#EF4444"></div>Prête à servir</span>
          <span><div class="fp-dot-sm" style="background:#10B981"></div>Servie</span>
        </div>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

.fp-modal-head {
  padding:14px 20px;border-bottom:1px solid #E0D4C8;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.fp-modal-body {
  overflow:auto;padding:16px;flex:1;
}
.fp-dash-grid {
  display:inline-grid;gap:6px;
}
.fp-dash-cell {
  width:72px; height:64px;
  border-radius:10px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:3px 5px;
  cursor:pointer;
  transition:transform .15s, box-shadow .15s;
  position:relative;
  color:#fff;
  overflow:hidden;
}
.fp-dash-cell .fp-cell-name {
  font-size:11px; font-weight:800;
  text-align:center; line-height:1.1;
  width:100%; overflow:hidden;
  text-overflow:ellipsis; white-space:nowrap;
}
.fp-dash-cell .fp-cell-status {
  font-size:9px; opacity:.85; margin-top:2px;
  white-space:nowrap;
}
.fp-dash-cell:hover { transform:scale(1.05);box-shadow:0 4px 12px rgba(0,0,0,.2); }
.fp-dash-cell.libre    { background:#D1D5DB;color:#6B7280; }
.fp-dash-cell.pending  { background:#F59E0B; }
.fp-dash-cell.preparing{ background:#3B82F6; }
.fp-dash-cell.ready    { background:#EF4444;animation:fp-pulse 1s ease-in-out infinite; }
.fp-dash-cell.done     { background:#10B981; }
.fp-badge-count {
  position:absolute;top:4px;right:4px;
  background:rgba(255,255,255,.3);
  border-radius:8px;font-size:9px;
  padding:1px 4px;font-weight:800;
}
@keyframes fp-pulse {
  0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}
  50%{box-shadow:0 0 0 8px rgba(239,68,68,0)}
}
.fp-legend-dash {
  display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;font-size:12px;
}
.fp-legend-dash span {
  display:flex;align-items:center;gap:5px;
}
.fp-dot-sm {
  width:12px;height:12px;border-radius:3px;flex-shrink:0;
}

  try {
    await updateDoc(doc(db, 'commandes', orderId), {
      status: newStatus,
      updatedAt: serverTimestamp(),
    });
  } catch(e) {

<script>
window.toggleSound = function() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('sound-btn');
  if (btn) btn.textContent = soundEnabled ? '🔔' : '🔕';
};

window.openStaffOrder = function() {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(43,29,22,.75);z-index:9000;'
    + 'display:flex;align-items:center;justify-content:center;padding:20px';
  const card = document.createElement('div');
  card.style.cssText = 'background:#fff;border-radius:20px;padding:24px;max-width:360px;width:100%;text-align:center';
  card.innerHTML = '<div style="font-size:32px;margin-bottom:10px">&#x1FA91;</div>'
    + '<div style="font-size:17px;font-weight:800;color:#2B1D16;margin-bottom:8px">Passer une commande</div>'
    + '<p style="font-size:13px;color:#7A6356;margin-bottom:20px;line-height:1.6">'
    + "Ouvrez le portail client pour passer une commande au nom d'un client.</p>"
    + '<div style="display:flex;gap:10px">'
    + '<button onclick="this.closest(\x27[style*=fixed]\x27).remove()" '
    + 'style="flex:1;padding:11px;border:1.5px solid #E0D4C8;border-radius:9px;background:#fff;'
    + 'color:#7A6356;font-weight:600;cursor:pointer;font-size:13px">Fermer</button>'
    + '<a href="/" target="_blank" '
    + 'style="flex:1;padding:11px;background:#F26522;color:#fff;border-radius:9px;'
    + 'font-weight:700;text-decoration:none;font-size:13px;display:block">Ouvrir le portail</a>'
    + '</div>';
  overlay.appendChild(card);
  document.body.appendChild(overlay);
  overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
};
</script>
